<!-- ── SVG filter defs (Phase 5+: hand-sketched canvas) ──────────────────────
     `feTurbulence` produces fractal noise, then `feDisplacementMap` shoves
     the source pixels around proportionally to that noise. The result is a
     wobble that turns Cytoscape's surgically-clean strokes into pencil
     lines. Tune `scale=` for more or less wobble; baseFrequency controls
     wobble frequency (lower = longer arcs, higher = jittery). Filter-region
     extension via x/y/width/height prevents displaced strokes from being
     clipped by the source bounding box.
-->
<svg style="position:absolute;width:0;height:0;pointer-events:none" aria-hidden="true">
  <defs>
    <filter id="sketchify" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughen-sm" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="3" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughen-md" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="roughen-lg" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="3" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="stamp" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="turbulence" baseFrequency="0.04" numOctaves="2" seed="5"/>
      <feDisplacementMap in="SourceGraphic" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- Sketchy card borders — injected after each dynamic render via MutationObserver -->
<script>
(function () {
  const SVG_NS = 'http://www.w3.org/2000/svg';
  function injectSketch(el) {
    if (el.querySelector('.card-sketch-border')) return;
    const svg = document.createElementNS(SVG_NS, 'svg');
    svg.setAttribute('class', 'card-sketch-border');
    svg.setAttribute('aria-hidden', 'true');
    const rect = document.createElementNS(SVG_NS, 'rect');
    rect.setAttribute('x', '1%'); rect.setAttribute('y', '1%');
    rect.setAttribute('width', '98%'); rect.setAttribute('height', '98%');
    rect.setAttribute('rx', '8');
    rect.setAttribute('fill', 'none');
    rect.setAttribute('stroke', 'var(--color-cream-line)');
    rect.setAttribute('stroke-width', '1.5');
    rect.setAttribute('filter', 'url(#roughen-sm)');
    svg.appendChild(rect);
    el.insertBefore(svg, el.firstChild);
  }
  function scanCards(root) {
    (root || document).querySelectorAll('.card:not(.card-add)').forEach(injectSketch);
  }
  const obs = new MutationObserver(function (muts) {
    muts.forEach(function (m) {
      m.addedNodes.forEach(function (n) {
        if (n.nodeType !== 1) return;
        if (n.matches && n.matches('.card:not(.card-add)')) injectSketch(n);
        scanCards(n);
      });
    });
  });
  obs.observe(document.getElementById('main'), { childList: true, subtree: true });
})();
</script>
