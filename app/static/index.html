<!-- ── SVG filter defs (Phase 5+: hand-sketched canvas) ──────────────────────
     `feTurbulence` produces fractal noise, then `feDisplacementMap` shoves
     the source pixels around proportionally to that noise. The result is a
     wobble that turns Cytoscape's surgically-clean strokes into pencil
     lines. Tune `scale=` for more or less wobble; baseFrequency controls
     wobble frequency (lower = longer arcs, higher = jittery). Filter-region
     extension via x/y/width/height prevents displaced strokes from being
     clipped by the source bounding box.
-->
<svg style="position:absolute;width:0;height:0;pointer-events:none" aria-hidden="true">
  <defs>
    <filter id="sketchify" x="-5%" y="-5%" width="110%" height="110%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>
