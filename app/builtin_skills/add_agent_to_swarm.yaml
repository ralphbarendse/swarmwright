name: add_agent_to_swarm
description: >
  Add an agent to an existing swarm in one call. Handles add_agent,
  set_entry_point, and any skill connections — replacing three separate
  patch_topology calls.
timeout_seconds: 60
allowed_packages: []
input_schema:
  type: object
  required: [swarm_id, agent_name]
  properties:
    swarm_id:
      type: string
      description: ID of the swarm to add the agent to.
    agent_name:
      type: string
      description: Name for the new agent (lowercase, no spaces).
    layer:
      type: string
      description: "Agent layer: orchestrator, executioner, policy, or perceptionist. Defaults to orchestrator."
    constitution:
      type: string
      description: Full constitution markdown for the agent. If omitted, a minimal placeholder is used.
    set_as_entry_point:
      type: boolean
      description: Whether to set this agent as the swarm's entry point. Defaults to true.
    skills:
      type: array
      description: Skills to attach. Each item needs skill_name and purpose.
      items:
        type: object
        properties:
          skill_name: {type: string}
          purpose:    {type: string}
output_schema:
  type: object
  required: [ok]
  properties:
    ok:              {type: boolean}
    swarm_id:        {type: string}
    agent_name:      {type: string}
    skills_attached: {type: integer}
    error:           {type: string}
    message:         {type: string}
