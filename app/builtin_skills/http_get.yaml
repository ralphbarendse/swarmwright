name: http_get
description: Perform an HTTP GET request and return the response status, headers, and body.
timeout_seconds: 30
allowed_packages: []
input_schema:
  type: object
  required: [url]
  properties:
    url:
      type: string
      description: The URL to fetch
    headers:
      type: object
      description: Optional request headers
      additionalProperties:
        type: string
    as_json:
      type: boolean
      description: If true, parse the response body as JSON and include it under the "json" key
      default: false
output_schema:
  type: object
  required: [status, body]
  properties:
    status:
      type: integer
    headers:
      type: object
    body:
      type: string
    json:
      description: Parsed JSON body (only present when as_json=true and parsing succeeded)
