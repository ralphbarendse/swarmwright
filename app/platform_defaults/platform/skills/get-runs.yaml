description: List recent runs, optionally filtered by swarm. Returns status, timing, and errors.
input_schema:
  type: object
  properties:
    swarm_id:
      type: string
      description: Optional swarm ID to filter runs
    limit:
      type: integer
      description: Max number of runs to return (default 10)
  required: []
output_schema:
  type: object
  properties:
    runs:
      type: array
allowed_packages: []
timeout_seconds: 10
