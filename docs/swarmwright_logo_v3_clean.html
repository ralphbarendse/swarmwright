<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&family=Kalam:wght@300;400;700&display=swap');
body { margin: 0; background: transparent; }
.wrap {
  background: #f5f0e8;
  padding: 40px 48px;
  border-radius: 8px;
  position: relative;
  font-family: 'Kalam', cursive;
}

.content {
  position: relative;
  z-index: 2;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 32px;
  align-items: center;
  min-height: 320px;
}

/* Emblem area */
.emblem {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.emblem-svg {
  width: 260px;
  height: 260px;
}

/* Text area */
.text-block {
  position: relative;
  padding-right: 12px;
}

.wordmark {
  font-family: 'Caveat', cursive;
  font-size: 110px;
  line-height: 0.85;
  color: #1e3a5f;
  letter-spacing: -3px;
  font-weight: 700;
  display: block;
}

.wordmark-2 {
  font-family: 'Caveat', cursive;
  font-size: 110px;
  line-height: 0.85;
  color: #c97c2a;
  letter-spacing: -3px;
  font-weight: 700;
  margin-top: -10px;
  display: block;
  transform: rotate(-0.5deg);
  transform-origin: left center;
}

.tagline-block {
  margin-top: 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.tagline-arrow {
  font-family: 'Caveat', cursive;
  font-size: 26px;
  color: #c97c2a;
  transform: rotate(-12deg);
}
.tagline {
  font-family: 'Special Elite', monospace;
  font-size: 14px;
  color: #1e3a5f;
  letter-spacing: 2px;
  background: rgba(201, 124, 42, 0.18);
  padding: 4px 12px;
  border-radius: 12px;
  border: 1px dashed rgba(201, 124, 42, 0.5);
  display: inline-block;
}

/* Sticky note */
.sticky {
  position: absolute;
  top: -10px;
  right: 0;
  width: 130px;
  padding: 12px 14px 14px;
  background: #f4d978;
  font-family: 'Caveat', cursive;
  font-size: 18px;
  color: #4a3a1a;
  line-height: 1.15;
  font-weight: 700;
  transform: rotate(4deg);
  box-shadow: 2px 4px 8px rgba(0,0,0,0.12), inset 0 -3px 0 rgba(0,0,0,0.04);
  z-index: 3;
}
.sticky::before {
  content: '';
  position: absolute;
  top: -6px; left: 50%;
  transform: translateX(-50%) rotate(-3deg);
  width: 36px; height: 12px;
  background: rgba(180, 130, 30, 0.4);
  border-radius: 2px;
}

/* Animations */
@keyframes inkSpread {
  from { opacity: 0; }
  to { opacity: 1; }
}
.wordmark, .wordmark-2 { animation: inkSpread 0.8s ease both; }
.wordmark-2 { animation-delay: 0.3s; }
.tagline-block { animation: inkSpread 0.6s ease 0.7s both; }
.sticky { animation: stickyDrop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s both; }
@keyframes stickyDrop {
  from { transform: rotate(15deg) translateY(-30px); opacity: 0; }
  to { transform: rotate(4deg) translateY(0); opacity: 1; }
}

@keyframes nodeBreath {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.06); }
}
.node-breathe { animation: nodeBreath 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
.node-breathe.b2 { animation-delay: 0.5s; }
.node-breathe.b3 { animation-delay: 1s; }
.node-breathe.b4 { animation-delay: 1.5s; }
</style>
</head>
<body>
<div class="wrap">
  <div class="content">
    <div class="emblem">
      <svg class="emblem-svg" viewBox="-130 -130 260 260" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="rough">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
            <feDisplacementMap in="SourceGraphic" scale="1.2"/>
          </filter>
          <filter id="rough2">
            <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2" seed="7"/>
            <feDisplacementMap in="SourceGraphic" scale="0.8"/>
          </filter>
        </defs>

        <!-- Outer hex - hand drawn double-stroke -->
        <polygon points="0,-78 67,-39 67,39 0,78 -67,39 -67,-39"
                 fill="#faf7f2" stroke="#1e3a5f" stroke-width="2.2" stroke-linejoin="round" filter="url(#rough)"/>
        <polygon points="0,-75 64,-37 64,37 0,75 -64,37 -64,-37"
                 fill="none" stroke="#1e3a5f" stroke-width="0.8" opacity="0.4" filter="url(#rough2)"/>

        <!-- Inner detail hex -->
        <polygon points="0,-50 43,-25 43,25 0,50 -43,25 -43,-25"
                 fill="none" stroke="#c97c2a" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.5" filter="url(#rough2)"/>

        <!-- Edges - sketchy -->
        <path d="M -22 -22 Q 0 -24 22 -22" stroke="#1e3a5f" stroke-width="1.5" fill="none" filter="url(#rough)"/>
        <path d="M -22 -22 Q -24 -5 -28 14" stroke="#1e3a5f" stroke-width="1.5" fill="none" filter="url(#rough)"/>
        <path d="M 22 -22 Q 26 -5 28 14" stroke="#2a6b6b" stroke-width="1.5" fill="none" filter="url(#rough)"/>

        <!-- Dashed edges -->
        <path d="M -28 14 L 28 14" stroke="#3d4f7c" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
        <path d="M -28 14 Q -14 28 0 36" stroke="#3d4f7c" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
        <path d="M 28 14 Q 14 28 0 36" stroke="#c97c2a" stroke-width="1" stroke-dasharray="3 2" fill="none"/>

        <!-- Satellite edges -->
        <path d="M 24 -22 Q 38 -42 54 -58" stroke="#c97c2a" stroke-width="0.8" stroke-dasharray="2 2" fill="none" opacity="0.6"/>
        <path d="M -24 -22 Q -38 -38 -54 -50" stroke="#2a6b6b" stroke-width="0.8" stroke-dasharray="2 2" fill="none" opacity="0.6"/>
        <path d="M 28 16 Q 44 30 60 46" stroke="#1e3a5f" stroke-width="0.8" stroke-dasharray="2 2" fill="none" opacity="0.6"/>

        <!-- Nodes with sketchy fill -->
        <g class="node-breathe">
          <circle cx="-22" cy="-22" r="13" fill="#1e3a5f" filter="url(#rough2)"/>
          <text x="-22" y="-17" text-anchor="middle" fill="#f5f0e8" font-size="11" font-family="'Special Elite', monospace" font-weight="700">P</text>
        </g>
        <g class="node-breathe b2">
          <circle cx="22" cy="-22" r="13" fill="#2a6b6b" filter="url(#rough2)"/>
          <text x="22" y="-17" text-anchor="middle" fill="#f5f0e8" font-size="11" font-family="'Special Elite', monospace" font-weight="700">O</text>
        </g>
        <g class="node-breathe b3">
          <circle cx="-28" cy="14" r="13" fill="#3d4f7c" filter="url(#rough2)"/>
          <text x="-28" y="19" text-anchor="middle" fill="#f5f0e8" font-size="11" font-family="'Special Elite', monospace" font-weight="700">E</text>
        </g>
        <g class="node-breathe b4">
          <circle cx="28" cy="14" r="13" fill="#c97c2a" filter="url(#rough2)"/>
          <text x="28" y="19" text-anchor="middle" fill="#f5f0e8" font-size="11" font-family="'Special Elite', monospace" font-weight="700">P</text>
        </g>
        <g class="node-breathe">
          <circle cx="0" cy="38" r="10" fill="#1e3a5f" opacity="0.8" filter="url(#rough2)"/>
          <text x="0" y="42" text-anchor="middle" fill="#f5f0e8" font-size="9" font-family="'Special Elite', monospace" font-weight="700">E</text>
        </g>

        <!-- Satellites -->
        <circle cx="56" cy="-60" r="7" fill="#faf7f2" stroke="#c97c2a" stroke-width="1.6" filter="url(#rough2)"/>
        <circle cx="-56" cy="-52" r="6" fill="#faf7f2" stroke="#2a6b6b" stroke-width="1.4" filter="url(#rough2)"/>
        <circle cx="62" cy="48" r="6" fill="#faf7f2" stroke="#1e3a5f" stroke-width="1.3" filter="url(#rough2)"/>
      </svg>
    </div>

    <div class="text-block">
      <span class="wordmark">Swarm</span>
      <span class="wordmark-2">Wright</span>

      <div class="tagline-block">
        <span class="tagline-arrow">→</span>
        <span class="tagline">build the swarm</span>
      </div>

      <div class="sticky">
        get it now!
      </div>
    </div>
  </div>
</div>
</body>
</html>
